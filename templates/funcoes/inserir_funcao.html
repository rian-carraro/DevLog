{% extends "base.html" %}

{% block titulo %}Nova Função{% endblock %}

{% block conteudo %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <a href="{{ url_for('listar_funcoes') }}" class="text-muted text-decoration-none small">
            <i class="bi bi-arrow-left me-1"></i>Voltar para Funções
        </a>
        <h2 class="mt-1"><i class="bi bi-shield-plus me-2"></i>Nova função</h2>
    </div>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">

            <div class="mb-3">
                <label for="nome" class="form-label">Nome da função <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: Administrador" required>
            </div>

            <div class="mb-3">
                <label for="status" class="form-label">Status <span class="text-danger">*</span></label>
                <select class="form-select" id="status" name="status" required>
                    <option value="" disabled selected>Selecione...</option>
                    <option value="Ativo">Ativo</option>
                    <option value="Inativo">Inativo</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="descricao" class="form-label">Descrição</label>
                <textarea class="form-control" id="descricao" name="descricao" rows="3"
                    placeholder="Descreva o propósito desta função..."></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Permissões de acesso</label>
                <div class="d-flex flex-column gap-2 mt-1">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="permissoes" value="usuarios" id="perm_usuarios">
                        <label class="form-check-label" for="perm_usuarios">
                            <i class="bi bi-people me-1 text-primary"></i>Usuários
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="permissoes" value="linguagens" id="perm_linguagens">
                        <label class="form-check-label" for="perm_linguagens">
                            <i class="bi bi-terminal me-1 text-info"></i>Linguagens
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="permissoes" value="recursos" id="perm_recursos">
                        <label class="form-check-label" for="perm_recursos">
                            <i class="bi bi-bookmark-star me-1 text-warning"></i>Recursos
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="permissoes" value="funcoes" id="perm_funcoes">
                        <label class="form-check-label" for="perm_funcoes">
                            <i class="bi bi-shield-lock me-1 text-danger"></i>Funções
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-1"></i>Salvar função
            </button>
        </form>
    </div>
</div>

{% endblock %}
