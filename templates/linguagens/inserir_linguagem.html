{% extends "base.html" %}

{% block titulo %}Nova linguagem{% endblock %}

{% block conteudo %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <h2 class="mb-4"><i class="bi bi-terminal me-2"></i>Nova linguagem</h2>

        <form action="{{ url_for('inserir_linguagem') }}" method="POST">

            <div class="mb-3">
                <label for="nome" class="form-label">Nome da linguagem <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="nome" name="nome"
                    placeholder="Ex: Python, JavaScript, Java..." required>
            </div>

            <div class="mb-3">
                <label for="status" class="form-label">Status <span class="text-danger">*</span></label>
                <select class="form-select" id="status" name="status" required>
                    <option value="" disabled selected>Selecione um status</option>
                    <option value="Quero estudar">Quero estudar</option>
                    <option value="Estudando">Estudando</option>
                    <option value="Concluído">Concluído</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="nivel" class="form-label">Nível <span class="text-danger">*</span></label>
                <select class="form-select" id="nivel" name="nivel" required>
                    <option value="" disabled selected>Selecione seu nível</option>
                    <option value="Iniciante">Iniciante</option>
                    <option value="Intermediário">Intermediário</option>
                    <option value="Avançado">Avançado</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="nota" class="form-label">Notas pessoais</label>
                <textarea class="form-control" id="nota" name="nota" rows="3"
                    placeholder="Por que quer aprender? O que já sabe? Dicas para si mesmo..."></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Salvar
                </button>
                <a href="{{ url_for('listar_linguagens') }}" class="btn btn-secondary">
                    <i class="bi bi-x-lg me-1"></i>Cancelar
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
